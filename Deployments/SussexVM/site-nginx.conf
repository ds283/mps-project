# portal: https
server {
    listen 443 ssl;
    http2 on;
    server_name mpsprojects.sussex.ac.uk;

    # Use Docker's embedded DNS resolver so that proxy_pass targets are resolved
    # per-request rather than at startup. This prevents nginx from failing to start
    # when the Swarm service VIP is not yet registered in DNS during a fresh stack
    # deploy. valid is omitted so nginx honours the TTL from Docker's DNS (~600s for
    # VIP services); the VIP is stable across rolling updates and scale operations.
    resolver 127.0.0.11 ipv6=off;

    # allow special characters in headers
    ignore_invalid_headers off;

    # allow upload of files of any size (possibly needed for MinIO)
    client_max_body_size 0;

    proxy_buffering off;
    proxy_request_buffering off;

    location /flower/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;
        proxy_redirect off;

        real_ip_header X-Real-IP;

        set $upstream_flower flower:5000;
        proxy_pass http://$upstream_flower;
    }

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NginX-Proxy true;
        proxy_redirect off;
        real_ip_header X-Real-IP;

        set $upstream_web web:5000;
        proxy_pass http://$upstream_web;
    }

    ssl_certificate "/certificates/mpsprojects.sussex.ac.uk.pem";
    ssl_certificate_key "/nginx-secrets/mpsprojects.sussex.ac.uk.key";
    ssl_session_tickets off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-CCM:DHE-RSA-AES256-CCM8:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-CCM:DHE-RSA-AES128-CCM8:DHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
}

# portal: http
server {
    listen 80;
    listen [::]:80;

    server_name mpsprojects.sussex.ac.uk;
    return 302 https://$server_name$request_uri;
}
