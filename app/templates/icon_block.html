{% macro icon_block(icon_glyph, extra_classes=none, icon_classes="pt-1") %}
    <div class="d-flex flex-row justify-content-start align-items-start gap-2 {%- if extra_classes is not none %} {{ extra_classes }}{%- endif -%}">
        <i class="fas fa-{{ icon_glyph }} fa-lg {%- if icon_classes is not none %} {{ icon_classes }}{%- endif -%}"></i>
        <div class="w-100">
            {{ caller() }}
        </div>
    </div>
{% endmacro %}
