{% macro resource_card(icon, title, description, url, btn_label="Manage &rarr;") %}
<div class="col">
    <div class="card h-100 border-secondary">
        <div class="card-body">
            <h5 class="card-title">
                <i class="{{ icon }}"></i> {{ title }}
            </h5>
            <p class="card-text small text-body-secondary">{{ description }}</p>
        </div>
        <div class="card-footer bg-transparent border-0">
            <a href="{{ url }}" class="btn btn-sm btn-outline-primary">{{ btn_label }}</a>
        </div>
    </div>
</div>
{% endmacro %}

{% macro resource_grid() %}
<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    {{ caller() }}
</div>
{% endmacro %}
